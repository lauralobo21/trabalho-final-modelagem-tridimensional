<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Os ares do cangaço</title>

    <!-- Scripts -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</head>

<body>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="typewriter" src="assets/model.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="assets/pattern-imagem.patt">
            <a-entity rotation="-90 0 0">
                <a-entity gltf-model="#typewriter" position="0 0 0" scale="0.5 0.5 0.5"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">

                    >
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity visao></a-entity>
    </a-scene>

</body>

</html>
